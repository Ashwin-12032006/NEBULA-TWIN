# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/nebulatwindb
spring.datasource.username=dbadmin
spring.datasource.password=TwinP@ssw0rdSecrets!
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Auto-run DDL schema file on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Kubernetes Client Configuration
# Set true to use in-cluster config (running inside EKS pod), false to look for local kubeconfig
kubernetes.client.in-cluster=false
kubernetes.client.config-path=${user.home}/.kube/config

# Telemetry API endpoints
prometheus.api.url=http://localhost:9090
slack.webhook.url=https://your-slack-webhook-url-goes-here
